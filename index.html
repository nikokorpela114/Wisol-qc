.pdf-close{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}

.pdf-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px}
.pdf-icon{width:72px;height:72px;background:var(--bg3);border-radius:16px;display:flex;align-items:center;justify-content:center}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty svg{width:48px;height:48px;stroke:#d0d5e8;margin-bottom:12px}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a8a50;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* SYNC indicator */
.sync{position:fixed;top:env(safe-area-inset-top,12px);right:60px;font-size:11px;color:rgba(255,255,255,0.8);z-index:30;padding-top:2px}
</style>

<script>
const SUPABASE_URL = 'https://ddgsbamrafhasrtsrsyv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZ3NiYW1yYWZoYXNydHNyc3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODU2MzUsImV4cCI6MjA5Nzg2MTYzNX0.gsbIu5yAUA_iINCGF20p4bSAWJCaEN6UXi8_OlGC3Oc';
const MAP_URI = 'https://ddgsbamrafhasrtsrsyv.supabase.co/storage/v1/object/public/maps/map_hires.jpg';
const MAP_W = 840, MAP_H = 825;

const CATS = [
  'Paneeli rikki','Paneeli väärinpäin – ylä','Paneeli väärinpäin – ala',
  'Paneelikiinnikkeissä rakoja','Kiskon pultti löysä','Kiskon pultti puuttuu',
  'Paneelikiinnikkeiden momentit vajaat','Kiskot tasaamatta','Niittejä puuttuu',
  'Kannake vääntynyt / rikki','DC-kouru katkaisematta','Muu asia'
];
const SEV = {'Kriittinen':'bk','Huomio':'bh','Info':'bi'};
const SEVA = {'Kriittinen':'ak','Huomio':'ah','Info':'ai'};

let obs = [], counter = 0;

// GPS
let gpsCoords = null; // {x,y} in map image coords (0-1)
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    // Map GPS coords to image pixels
    // Isoneva bounding box (approximate from layout)
    // These are rough values - can be calibrated later
    const LAT_N = 62.945, LAT_S = 62.905, LNG_W = 27.11, LNG_E = 27.22;
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    const x = (lng - LNG_W) / (LNG_E - LNG_W);
    const y = (LAT_N - lat) / (LAT_N - LAT_S);
    gpsCoords = {x: Math.max(0,Math.min(1,x)), y: Math.max(0,Math.min(1,y))};
    updateAllGPSDots();
  }, null, {enableHighAccuracy:true, maximumAge:5000});
}

function updateAllGPSDots() {
  obs.forEach(o => updateGPSDot(o.id));
}

function updateGPSDot(id) {
  const dot = document.getElementById('gps-dot-'+id);
  const ring = document.getElementById('gps-ring-'+id);
  const state = mapStates[id];
  if (!dot || !ring || !gpsCoords || !state) return;
  const px = gpsCoords.x * MAP_W * state.scale + state.tx;
  const py = gpsCoords.y * MAP_H * state.scale + state.ty;
  dot.style.display = 'block';
  ring.style.display = 'block';
  dot.style.left = px + 'px';
  dot.style.top = py + 'px';
  ring.style.left = px + 'px';
  ring.style.top = py + 'px';
}

// MAP STATE
const mapStates = {};
function getMapState(id) {
  if (!mapStates[id]) mapStates[id] = {scale:0.29, tx:0, ty:0};
  return mapStates[id];
}

function applyMapTransform(id) {
  const s = getMapState(id);
  const wrap = document.getElementById('mwrap-'+id);
  if (wrap) wrap.style.transform = `translate(${s.tx}px,${s.ty}px) scale(${s.scale})`;
  updateMapDot(id);
  updateGPSDot(id);
}

function clampMap(id) {
  const s = getMapState(id);
  const cont = document.getElementById('mmap-'+id);
  if (!cont) return;
  const cw = cont.clientWidth, ch = cont.clientHeight;
  const iw = MAP_W * s.scale, ih = MAP_H * s.scale;
  if (iw > cw) { s.tx = Math.min(0, Math.max(cw-iw, s.tx)); }
  else { s.tx = (cw-iw)/2; }
  if (ih > ch) { s.ty = Math.min(0, Math.max(ch-ih, s.ty)); }
  else { s.ty = (ch-ih)/2; }
}

function zoomMap(id, factor) {
  const s = getMapState(id);
  const cont = document.getElementById('mmap-'+id);
  if (!cont) return;
  const cx = cont.clientWidth/2, cy = cont.clientHeight/2;
  const newScale = Math.min(3, Math.max(0.15, s.scale*factor));
  s.tx = cx - (cx-s.tx)*(newScale/s.scale);
  s.ty = cy - (cy-s.ty)*(newScale/s.scale);
  s.scale = newScale;
  clampMap(id);
  applyMapTransform(id);
}

function initMap(id) {
  const cont = document.getElementById('mmap-'+id);
  if (!cont || cont._init) return;
  cont._init = true;
  const s = getMapState(id);
  // Center map initially
  s.tx = (cont.clientWidth - MAP_W*s.scale)/2;
  s.ty = (cont.clientHeight - MAP_H*s.scale)/2;
  applyMapTransform(id);

  let last = null, wasPinch = false, startDist = 0, startScale = 1, startTx = 0, startTy = 0, moved = false;

  cont.addEventListener('touchstart', e => {
    e.preventDefault();
    wasPinch = false; moved = false;
    if (e.touches.length === 1) {
      last = {x: e.touches[0].clientX, y: e.touches[0].clientY, tx: s.tx, ty: s.ty};
    } else if (e.touches.length === 2) {
      wasPinch = true;
      startDist = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
      startScale = s.scale; startTx = s.tx; startTy = s.ty;
      last = {mx:(e.touches[0].clientX+e.touches[1].clientX)/2, my:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
  }, {passive:false});

  cont.addEventListener('touchmove', e => {
    e.preventDefault();
    moved = true;
    if (e.touches.length === 1 && last && !wasPinch) {
      s.tx = last.tx + (e.touches[0].clientX - last.x);
      s.ty = last.ty + (e.touches[0].clientY - last.y);
      clampMap(id); applyMapTransform(id);
    } else if (e.touches.length === 2) {
      wasPinch = true;
      const dist = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
      const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
      const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
      const rect = cont.getBoundingClientRect();
      const lx = mx-rect.left, ly = my-rect.top;
      const newScale = Math.min(3, Math.max(0.15, startScale*(dist/startDist)));
      s.tx = lx - (lx-startTx)*(newScale/startScale);
      s.ty = ly - (ly-startTy)*(newScale/startScale);
      s.scale = newScale;
      clampMap(id); applyMapTransform(id);
    }
  }, {passive:false});

  cont.addEventListener('touchend', e => {
    e.preventDefault();
    if (!wasPinch && !moved && e.changedTouches.length===1 && last) {
      const rect = cont.getBoundingClientRect();
      const tx = e.changedTouches[0].clientX, ty = e.changedTouches[0].clientY;
      const lx = (tx-rect.left-s.tx)/s.scale/MAP_W;
      const ly = (ty-rect.top-s.ty)/s.scale/MAP_H;
      const o = obs.find(o=>o.id===id);
      if (o) { o.pin={x:Math.max(0,Math.min(1,lx)),y:Math.max(0,Math.min(1,ly))}; updateMapDot(id); }
    }
    last = null;
  }, {passive:false});
}

function updateMapDot(id) {
  const dot = document.getElementById('mdot-'+id);
  const o = obs.find(o=>o.id===id);
  const s = getMapState(id);
  if (!dot || !o || !o.pin) { if(dot) dot.style.display='none'; return; }
  dot.style.display = 'block';
  dot.style.left = (o.pin.x*MAP_W*s.scale+s.tx)+'px';
  dot.style.top = (o.pin.y*MAP_H*s.scale+s.ty)+'px';
}

function clearPin(e,id) {
  e.stopPropagation();
  const o=obs.find(o=>o.id===id);
  if(o) o.pin=null;
  updateMapDot(id);
}

// SUPABASE
async function sbFetch(method, path, body) {
  const r = await fetch(SUPABASE_URL+path, {
    method, headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function saveObs(o) {
  const data = {
    cat:o.cat, sev:o.sev, note:o.note, muu:o.muu,
    pin_x:o.pin?.x??null, pin_y:o.pin?.y??null,
    site:document.getElementById('site').value,
    inspector:document.getElementById('inspector').value,
    rivi:document.getElementById('rivi').value,
    local_id:o.id
  };
  try {
    if (o.db_id) {
      await sbFetch('PATCH',`/rest/v1/observations?id=eq.${o.db_id}`,data);
    } else {
      const res = await sbFetch('POST','/rest/v1/observations',[data]);
      if (res && res[0]) o.db_id = res[0].id;
    }
    showSync('✓ Tallennettu');
  } catch(e) { showSync('⚠ Ei yhteyttä'); }
}

async function deleteObs(o) {
  if (o.db_id) {
    try { await sbFetch('DELETE',`/rest/v1/observations?id=eq.${o.db_id}`); } catch(e){}
  }
}

let syncTimer = null;
function showSync(msg) {
  const el = document.getElementById('sync-indicator');
  el.textContent = msg;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>el.textContent='', 3000);
}

function queueSave(o) {
  clearTimeout(o._saveTimer);
  o._saveTimer = setTimeout(()=>saveObs(o), 1200);
}

// TOAST
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// OBS
function addObs() {
  const id = ++counter;
  obs.push({id,cat:CATS[0],sev:'Huomio',note:'',muu:'',photos:[],pin:null,db_id:null});
  render();
  setTimeout(()=>{
    const cards=document.querySelectorAll('.obs-card');
    if(cards.length) cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'start'});
    initMap(id);
  },80);
}

function removeObs(id) {
  const o=obs.find(o=>o.id===id);
  if(o) deleteObs(o);
  obs=obs.filter(o=>o.id!==id);
  render();
}

function updateField(id,key,val) {
  const o=obs.find(o=>o.id===id);
  if(o){ o[key]=val; if(key==='cat') render(); queueSave(o); }
}

function setSev(id,sev) {
  const o=obs.find(o=>o.id===id);
  if(o){o.sev=sev; render(); queueSave(o);}
}

function addPhoto(id,files) {
  const o=obs.find(o=>o.id===id);
  if(!o) return;
  Array.from(files).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{o.photos.push({src:e.target.result}); render(); queueSave(o);};
    r.readAsDataURL(file);
  });
}

function removePhoto(id,pi) {
  const o=obs.find(o=>o.id===id);
  if(o){o.photos.splice(pi,1); render(); queueSave(o);}
}

// IMAGE ORIENTATION
async function fixOrientation(src) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.naturalWidth; c.height=img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      resolve(c.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>resolve(src);
    img.src=src;
  });
}

// PDF EXPORT
let currentPdfBlob = null;
async function exportPDF() {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=14,CW=W-M*2;
  let y=18;
  const site=document.getElementById('site').value||'Työmaa';
  const inspector=document.getElementById('inspector').value||'–';
  const rivi=document.getElementById('rivi').value||'–';
  const dateStr=new Date().toLocaleDateString('fi-FI');

  doc.setFillColor(26,47,204);
  doc.rect(0,0,W,28,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(245,168,0);
  doc.text('WISOL OY',M,12);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(255,255,255);
  doc.text('Laadunvalvontaraportti',M,19);
  doc.setFontSize(9); doc.setTextColor(180,200,255);
  doc.text(dateStr,W-M,12,{align:'right'});
  y=38;

  const meta=[['Työmaa',site],['Tarkastaja',inspector],['Rivi / alue',rivi]];
  meta.forEach(([k,v])=>{
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(100,100,120); doc.text(k,M,y);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(20,20,60); doc.text(v,M+28,y);
    y+=6;
  });
  y+=4; doc.setDrawColor(200,205,220); doc.line(M,y,W-M,y); y+=8;

  const sevCol={'Kriittinen':[180,40,40],'Huomio':[180,120,0],'Info':[30,140,80]};
  for(let i=0;i<obs.length;i++){
    const o=obs[i];
    if(i>0){ doc.addPage(); y=18; }
    const lbl=o.cat==='Muu asia'&&o.muu?`Muu – ${o.muu}`:o.cat;
    const col=sevCol[o.sev]||[80,80,80];
    doc.setFillColor(...col);
    doc.roundedRect(M,y,CW,7,1.5,1.5,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text(`${i+1}.  ${lbl}`,M+4,y+5);
    doc.text(o.sev,W-M-4,y+5,{align:'right'});
    y+=10;
    if(o.note){
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(40,40,40);
      const lines=doc.splitTextToSize(o.note,CW-4);
      doc.text(lines,M+2,y); y+=lines.length*5+3;
    }
    if(o.pin){
      if(y+62>278){doc.addPage();y=18;}
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(100,100,120);
      doc.text('Sijainti kartalla:',M+2,y); y+=4;
      try{
        doc.addImage(MAP_URI,'JPEG',M,y,90,88);
        const px=M+o.pin.x*90, py=y+o.pin.y*88;
        doc.setFillColor(220,40,40); doc.circle(px,py,3,'F');
        doc.setDrawColor(255,255,255); doc.setLineWidth(0.6); doc.circle(px,py,3,'S');
      }catch(e){}
      y+=92;
    }
    for(let pi=0;pi<o.photos.length;pi++){
      const corrected=await fixOrientation(o.photos[pi].src);
      const im=new Image(); im.src=corrected;
      await new Promise(r=>{im.onload=r;im.onerror=r;});
      const nw=im.naturalWidth||800,nh=im.naturalHeight||600;
      const sc=Math.min(CW/nw,150/nh);
      const dw=nw*sc,dh=nh*sc;
      if(y+dh>278){doc.addPage();y=18;}
      try{doc.addImage(corrected,'JPEG',M,y,dw,dh);}catch(e){try{doc.addImage(corrected,'PNG',M,y,dw,dh);}catch(e2){}}
      y+=dh+4;
    }
    doc.setDrawColor(220,220,220); doc.line(M,y,W-M,y);
  }
  const tp=doc.getNumberOfPages();
  for(let p=1;p<=tp;p++){
    doc.setPage(p); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(160,160,160);
    doc.text(`Wisol Oy · QC-raportti · ${dateStr}`,M,292);
    doc.text(`${p} / ${tp}`,W-M,292,{align:'right'});
  }
  currentPdfBlob=doc.output('blob');
  const fn=`QC_${site.replace(/\s+/g,'_')}_${dateStr.replace(/\./g,'-')}.pdf`;
  const pdfFile=new File([currentPdfBlob],fn,{type:'application/pdf'});
  document.getElementById('pdf-ov').classList.add('show');
  document.getElementById('pdf-share-btn').onclick=async()=>{
    if(navigator.canShare&&navigator.canShare({files:[pdfFile]})){
      try{await navigator.share({files:[pdfFile],title:fn});}
      catch(e){if(e.name!=='AbortError') fallbackDl(fn);}
    } else { fallbackDl(fn); }
  };
}

function fallbackDl(fn){
  const url=URL.createObjectURL(currentPdfBlob);
  const a=document.createElement('a'); a.href=url; a.download=fn;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

function closePDF(){ document.getElementById('pdf-ov').classList.remove('show'); }
